name: Build imdone-listen

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build arm64 + x86_64
        run: |
          swiftc imdone-listen/main.swift \
            -target arm64-apple-macos12 \
            -o imdone-listen-arm64 \
            -framework AVFoundation -framework Speech -framework Foundation -O

          swiftc imdone-listen/main.swift \
            -target x86_64-apple-macos12 \
            -o imdone-listen-x86_64 \
            -framework AVFoundation -framework Speech -framework Foundation -O

          lipo -create -output imdone-listen-darwin imdone-listen-arm64 imdone-listen-x86_64

      - name: Ad-hoc sign
        run: codesign -s - imdone-listen-darwin

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: imdone-listen-darwin
